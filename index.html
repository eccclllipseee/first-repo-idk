<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт-портфолио</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Портфолио разработчика</h1>
    <button id="theme-toggle" aria-label="Переключить тему">🌓 Сменить тему</button>
    
    <button class="burger" id="burger-btn" aria-label="Открыть меню">☰</button>
    
    <nav>
        <a href="#about">Обо мне</a>
        <a href="#projects">Проекты</a>
        <a href="#contact">Контакты</a>
    </nav>
</header>


    <nav>
        <a href="#about">Обо мне</a>
        <a href="#projects">Проекты</a>
        <a href="#contact">Контакты</a>
    </nav>
</header>

<main>
        <section id="about">
        <h2>О себе</h2>
        <p>Привет! Я начинающий веб-разработчик. Изучаю HTML, CSS и JavaScript.</p>
        <div class="extra-info" id="extra-info">
            <p>Люблю чипсы сырные</p>
        </div>
        <button id="toggle-btn">Показать больше</button>
    </section>


            <section id="projects">
        <h2>Проекты</h2>
        <div class="projects-controls" style="margin-bottom: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
            <input type="text" id="search-input" placeholder="Поиск проекта..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid #ccc; width: 250px;">
            
            <div class="filters" style="display: flex; gap: 0.5rem;">
                <button data-filter="all" class="active">Все</button>
                <button data-filter="frontend">Frontend</button>
                <button data-filter="backend">Backend</button>
            </div>
        </div>
        <div class="projects-grid" id="projects-grid"></div>
    </section>



    <section id="contact">
        <h2>Связаться со мной</h2>
               <form id="contact-form">
            <label for="name">Имя</label>
            <input type="text" id="name" name="name">
            <span class="error" id="name-error"></span> <!-- Поле ошибки имени -->
            
            <label for="email">Email</label>
            <input type="text" id="email" name="email">
            <span class="error" id="email-error"></span> <!-- Поле ошибки email -->
            
            <label for="message">Сообщение</label>
            <textarea id="message" name="message"></textarea>
            
            <button type="submit">Отправить</button>
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026. Обновлено: <span id="update-date"></span></p>
</footer>
    <script src="script.js"></script>
</body>
</html>
